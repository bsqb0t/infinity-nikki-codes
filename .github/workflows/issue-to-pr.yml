name: 搭配码 Issue 自动转 PR

on:
  issues:
    types: [opened, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-outfit:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[搭配码]')
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 解析 Issue 中的 JSON
        uses: actions/github-script@v9
        id: parse
        with:
          script: |
            const body = context.payload.issue.body || '';
            const match = body.match(/```json\s*([\s\S]*?)\s*```/);
            if (!match) {
              core.setFailed('未找到 JSON 数据块。请确保正文包含 ```json ... ``` 格式的数据。');
              return;
            }
            const data = JSON.parse(match[1]);
            if (!data.id || !data.code || !data.name) {
              core.setFailed('JSON 缺少必要字段（id / code / name）');
              return;
            }

            // 从 Issue 正文中提取附件图片 URL（GitHub 上传的图片）
            const imgUrls = [];
            // 匹配 ![...](url) 格式
            const mdImgs = body.matchAll(/!\[.*?\]\((https:\/\/github\.com\/user-attachments\/assets\/[^\s)]+)\)/g);
            for (const m of mdImgs) imgUrls.push(m[1]);
            // 匹配 <img src="url"> 格式
            const htmlImgs = body.matchAll(/<img[^>]+src="(https:\/\/github\.com\/user-attachments\/assets\/[^"]+)"/g);
            for (const m of htmlImgs) imgUrls.push(m[1]);

            // 合并到 images 数组（去重）
            if (imgUrls.length > 0) {
              const existing = new Set(data.images || []);
              imgUrls.forEach(u => existing.add(u));
              data.images = [...existing];
              if (!data.thumbnail && imgUrls.length > 0) {
                data.thumbnail = imgUrls[0];
              }
              core.info('提取到 ' + imgUrls.length + ' 张附件图片');
            }

            core.setOutput('json', JSON.stringify(data));
            core.setOutput('id', data.id);
            core.setOutput('name', data.name);
            core.setOutput('has_images', data.images && data.images.length > 0 ? 'true' : 'false');

      - name: 更新 outfits.json
        uses: actions/github-script@v9
        id: update-db
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(process.env.OUTFIT_JSON);
            const db = JSON.parse(fs.readFileSync('data/outfits.json', 'utf8'));

            const existIdx = db.outfits.findIndex(o => o.id === data.id);
            if (existIdx !== -1) {
              // ID 已存在，更新（用于 Issue 编辑场景）
              db.outfits[existIdx] = data;
              core.info('已更新: ' + data.id);
              core.setOutput('action', 'updated');
            } else {
              db.outfits.push(data);
              core.info('已添加: ' + data.id);
              core.setOutput('action', 'added');
            }

            db.lastUpdated = new Date().toISOString();
            fs.writeFileSync('data/outfits.json', JSON.stringify(db, null, 2) + '\n');
        env:
          OUTFIT_JSON: ${{ steps.parse.outputs.json }}

      - name: 查找已关联的 PR
        uses: actions/github-script@v9
        id: find-pr
        with:
          script: |
            const branch = 'outfit/${{ steps.parse.outputs.id }}';
            try {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: context.repo.owner + ':' + branch
              });
              if (prs.data.length > 0) {
                core.setOutput('existing_pr', prs.data[0].number);
                core.setOutput('existing_branch', branch);
                core.info('找到已有 PR: #' + prs.data[0].number);
              } else {
                core.setOutput('existing_pr', '');
              }
            } catch (e) {
              core.setOutput('existing_pr', '');
            }

      - name: 创建 PR
        if: steps.find-pr.outputs.existing_pr == ''
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        with:
          commit-message: "添加搭配码: ${{ steps.parse.outputs.name }}"
          branch: "outfit/${{ steps.parse.outputs.id }}"
          title: "[搭配码] ${{ steps.parse.outputs.name }}"
          body: |
            自动从 Issue #${{ github.event.issue.number }} 生成

            **搭配码：** `${{ steps.parse.outputs.id }}`
            **名称：** ${{ steps.parse.outputs.name }}

            ${{ steps.parse.outputs.has_images == 'true' && '> 注意：此搭配码引用了图片，请确认图片已上传到 `images/` 目录。' || '' }}

          labels: outfit-code

      - name: 更新已有 PR
        if: steps.find-pr.outputs.existing_pr != ''
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.existing_pr }}');
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: '自动从 Issue #${{ github.event.issue.number }} 同步更新\n\n**搭配码：** `${{ steps.parse.outputs.id }}`\n**名称：** ${{ steps.parse.outputs.name }}\n\n> 最后更新: ' + new Date().toISOString()
            });
            core.info('已更新 PR #' + prNumber);

      - name: 关闭 Issue 并留言
        uses: actions/github-script@v9
        with:
          script: |
            const prNum = '${{ steps.find-pr.outputs.existing_pr }}' || '${{ steps.create-pr.outputs.pull-request-number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '已自动创建 Pull Request #' + prNum + '，请等待维护者审核合并。\n\n合并后网站将自动更新，本 Issue 将自动关闭。'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['已处理']
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
